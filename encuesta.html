<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>GOYURT NPS</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-slate-100 min-h-screen">

<div class="max-w-2xl mx-auto p-4">

<div class="bg-white rounded-3xl shadow-xl p-6 mt-8">

<div class="text-center mb-8">

<img
src="https://goyurt.com.co/wp-content/uploads/2025/09/logo_goyurt_cian_header.svg"
class="h-20 mx-auto mb-4">

<h1 class="text-3xl font-bold">
Queremos escucharte
</h1>

<p class="text-gray-500 mt-2">
Tu opinión nos ayuda a mejorar cada día
</p>

</div>

<form id="surveyForm">

<input
id="nombre"
required
placeholder="Tu nombre"
class="w-full border rounded-xl p-3 mb-6">

<h2 class="font-bold text-lg mb-3">
¿Qué te pareció la experiencia?
</h2>

<div class="flex justify-center gap-6 mb-8">

<label>
<input type="radio" name="experiencia" value="Excelente" hidden required>
<div class="text-5xl cursor-pointer">😀</div>
</label>

<label>
<input type="radio" name="experiencia" value="Regular" hidden>
<div class="text-5xl cursor-pointer">🙂</div>
</label>

<label>
<input type="radio" name="experiencia" value="Mala" hidden>
<div class="text-5xl cursor-pointer">☹️</div>
</label>

</div>

<h2 class="font-bold text-lg mb-3">
¿Recomendarías la experiencia?
</h2>

<div class="flex justify-center gap-6 mb-8">

<label>
<input type="radio" name="recomendaria" value="Si" hidden required>
<div class="text-5xl cursor-pointer">😀</div>
</label>

<label>
<input type="radio" name="recomendaria" value="Tal vez" hidden>
<div class="text-5xl cursor-pointer">🙂</div>
</label>

<label>
<input type="radio" name="recomendaria" value="No" hidden>
<div class="text-5xl cursor-pointer">☹️</div>
</label>

</div>

<h2 class="font-bold text-lg mb-3">
¿Qué te pareció el producto de temporada?
</h2>

<div class="flex justify-center gap-6 mb-8">

<label>
<input type="radio" name="producto" value="Excelente" hidden required>
<div class="text-5xl cursor-pointer">😀</div>
</label>

<label>
<input type="radio" name="producto" value="Regular" hidden>
<div class="text-5xl cursor-pointer">🙂</div>
</label>

<label>
<input type="radio" name="producto" value="Mala" hidden>
<div class="text-5xl cursor-pointer">☹️</div>
</label>

</div>

<textarea
id="comentario"
placeholder="Déjanos un comentario"
class="w-full border rounded-xl p-3 h-32 mb-6"></textarea>

<button
class="w-full bg-cyan-600 hover:bg-cyan-700 text-white p-4 rounded-xl font-bold">

Enviar encuesta

</button>

</form>

<div
id="success"
class="hidden text-center py-10">

<h2 class="text-3xl font-bold text-green-600">
🎉 Gracias
</h2>

<p class="mt-3">
Tu opinión ha sido registrada correctamente.
</p>

</div>

</div>

</div>

<script src="js/config.js"></script>
<script src="js/encuesta.js"></script>

</body>
</html>
