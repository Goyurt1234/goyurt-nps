<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>GOYURT NPS</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

.emoji-option{
    font-size:55px;
    padding:15px;
    border-radius:20px;
    cursor:pointer;
    transition:all .2s ease;
    display:flex;
    align-items:center;
    justify-content:center;
}

.emoji-option:hover{
    transform:scale(1.15);
}

input[type="radio"]:checked + .emoji-option{
    border:3px solid #06b6d4;
    background:#ecfeff;
    transform:scale(1.1);
    box-shadow:0 4px 12px rgba(0,0,0,.15);
}

</style>

</head>

<body class="bg-slate-100 min-h-screen">

<div class="max-w-2xl mx-auto p-4">

<div class="bg-white rounded-3xl shadow-xl p-6 mt-8">

<div style="text-align:right;margin-bottom:15px;">

<button
onclick="cerrarSesion()"
style="
background:#ef4444;
color:white;
border:none;
padding:10px 15px;
border-radius:10px;
cursor:pointer;">

Cerrar sesión

</button>

</div>

<div class="text-center mb-8">

<img
src="https://goyurt.com.co/wp-content/uploads/2025/09/logo_goyurt_cian_header.svg"
class="h-20 mx-auto mb-4">

<h1 class="text-3xl font-bold">
Queremos escucharte
</h1>

<p class="text-gray-500 mt-2">
Tu opinión nos ayuda a mejorar cada día
</p>

</div>

<form id="surveyForm">

<input
id="nombre"
required
placeholder="Tu nombre"
class="w-full border rounded-xl p-3 mb-6">

<h2 class="font-bold text-lg mb-3">
¿Qué te pareció la experiencia?
</h2>

<div class="flex justify-center gap-6 mb-8">

<label>
<input type="radio" name="experiencia" value="Excelente" hidden required>
<div class="emoji-option">😀</div>
</label>

<label>
<input type="radio" name="experiencia" value="Regular" hidden>
<div class="emoji-option">🙂</div>
</label>

<label>
<input type="radio" name="experiencia" value="Mala" hidden>
<div class="emoji-option">☹️</div>
</label>

</div>

<h2 class="font-bold text-lg mb-3">
¿Recomendarías la experiencia?
</h2>

<div class="flex justify-center gap-6 mb-8">

<label>
<input type="radio" name="recomendaria" value="Si" hidden required>
<div class="emoji-option">😀</div>
</label>

<label>
<input type="radio" name="recomendaria" value="Tal vez" hidden>
<div class="emoji-option">🙂</div>
</label>

<label>
<input type="radio" name="recomendaria" value="No" hidden>
<div class="emoji-option">☹️</div>
</label>

</div>

<h2 class="font-bold text-lg mb-3">
¿Qué te pareció el producto de temporada?
</h2>

<div class="flex justify-center gap-6 mb-8">

<label>
<input type="radio" name="producto" value="Excelente" hidden required>
<div class="emoji-option">😀</div>
</label>

<label>
<input type="radio" name="producto" value="Regular" hidden>
<div class="emoji-option">🙂</div>
</label>

<label>
<input type="radio" name="producto" value="Mala" hidden>
<div class="emoji-option">☹️</div>
</label>

</div>

<textarea
id="comentario"
placeholder="Déjanos un comentario"
class="w-full border rounded-xl p-3 h-32 mb-6"></textarea>

<button
class="w-full bg-cyan-600 hover:bg-cyan-700 text-white p-4 rounded-xl font-bold">

Enviar encuesta

</button>

</form>

<div
id="success"
class="hidden text-center py-10">

<h2 class="text-3xl font-bold text-green-600">
🎉 Gracias
</h2>

<p class="mt-3 mb-6">
Tu opinión ha sido registrada correctamente.
</p>

<button
onclick="reiniciarEncuesta()"
class="bg-cyan-600 hover:bg-cyan-700 text-white px-8 py-4 rounded-xl font-bold">

Responder otra encuesta

</button>

</div>

</div>

</div>

<script src="js/config.js"></script>
<script src="js/encuesta.js"></script>

</body>
</html>
